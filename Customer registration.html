<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration</title>
</head>

<body>
    <fieldset style="width: 50%; height: 50%; background-color: lightblue; border-radius: 20px; padding-top: 30px;
     margin: auto; margin-top: 50px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5); ">
        <div class="registration">
            <b><u>
                    <p>Customer Registration Form</p>
                </u></b>
            <form action="#" method="post" id="customer_registration_form" style="padding-top: 20px;" width="100%"
                height="100%">
                <label for="name">Full Name:</label>
                <input type="text" name="name" id="name" placeholder="Enter your full name" required><br><br>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required><br><br>
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required><br><br>
                <label for="age">age:</label>
                <input type="number" name="age" id="age" placeholder="Enter your age" required><br><br>
                <label for="services">Services:</label>
                <select name="services" id="services" required>
                    <option value="">Select a service</option>
                    <option value="accommodation">Gym</option>
                    <option value="restaurant">Spa</option>
                    <option value="wifi">Airport Pick-up</option>
                    <option value="laundry">Breakfast included</option>
                    <option value="room_service">Swimming Pool</option>
                </select><br><br>
                select gender:<br>
                <input type="radio" name="gender" id="male" value=" male" required>
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value=" female" required>
                <label for="female">Female</label><br><br>
                country
                <select name="country" id="country" required>
                    <option value="">Select a country</option>
                    <option value="kenya">Kenya</option>
                    <option value="uganda">Uganda</option>
                    <option value="tanzania">Tanzania</option>
                    <option value="rwanda">Rwanda</option>
                    <option value="south_sudan">South Sudan</option>
                </select><br><br>
                <textarea name="text" id="" placeholder="Enter any additional information"></textarea>
        </div>
        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </fieldset>
</body>

</html>
